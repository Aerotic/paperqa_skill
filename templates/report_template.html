<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — PaperQA2 分析报告</title>
<style>
:root {
  --primary: #1a1a2e; --accent: #e94560; --accent2: #0f3460;
  --bg: #f8f9fa; --card: #ffffff; --text: #333;
  --text-light: #666; --border: #dee2e6;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
}
.container { max-width: 960px; margin: 0 auto; padding: 0 24px; }
header {
  background: linear-gradient(135deg, var(--primary), var(--accent2));
  color: #fff; padding: 60px 0 48px; text-align: center;
}
header h1 { font-size: 2.5em; font-weight: 800; letter-spacing: -0.02em; }
header .subtitle { font-size: 1.15em; opacity: 0.85; margin-top: 8px; }
header .meta { margin-top: 16px; font-size: 0.9em; opacity: 0.7; }
section { padding: 48px 0; border-bottom: 1px solid var(--border); }
section:last-child { border-bottom: none; }
h2 {
  font-size: 1.6em; font-weight: 700; color: var(--primary);
  margin-bottom: 20px; padding-bottom: 8px;
  border-bottom: 3px solid var(--accent); display: inline-block;
}
h3 { font-size: 1.2em; font-weight: 600; color: var(--accent2); margin: 24px 0 12px; }
p { margin-bottom: 14px; }
.card {
  background: var(--card); border-radius: 12px; padding: 24px;
  box-shadow: var(--shadow); margin: 20px 0;
}
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) { .card-grid { grid-template-columns: 1fr; } }
.tag {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 0.8em; font-weight: 600;
}
.tag-blue { background: #dbeafe; color: #1e40af; }
.tag-red { background: #fee2e2; color: #b91c1c; }
.tag-green { background: #d1fae5; color: #065f46; }
.tag-purple { background: #e9d5ff; color: #6b21a8; }
.tag-orange { background: #fed7aa; color: #9a3412; }
table {
  width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.95em;
}
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--primary); color: #fff; font-weight: 600; }
tr:nth-child(even) td { background: #f1f3f5; }
.compare-box { display: flex; gap: 20px; margin: 20px 0; }
.compare-box > div {
  flex: 1; border-radius: 12px; padding: 20px; box-shadow: var(--shadow);
}
.compare-box .baseline { background: #fff1f0; border-left: 4px solid #f5222d; }
.compare-box .optimized { background: #f6ffed; border-left: 4px solid #52c41a; }
@media (max-width: 600px) { .compare-box { flex-direction: column; } }
.info-box {
  background: #eef2ff; border-left: 4px solid #6366f1;
  border-radius: 8px; padding: 16px 20px; margin: 16px 0;
}
.info-box strong { color: var(--accent2); }
footer { text-align: center; padding: 32px; color: var(--text-light); font-size: 0.85em; }
ul, ol { margin: 10px 0 10px 24px; }
li { margin-bottom: 6px; }
.highlight { background: #fef3c7; padding: 1px 4px; border-radius: 3px; }
.figure-placeholder {
  background: #fff; border: 2px dashed var(--border);
  border-radius: 12px; padding: 32px 24px; text-align: center; margin: 20px 0;
  color: var(--text-light); font-size: 0.9em;
}
.metric-bar { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
.metric-bar .label { width: 120px; font-weight: 600; font-size: 0.9em; }
.metric-bar .bar-bg {
  flex: 1; height: 24px; background: #e9ecef; border-radius: 12px; overflow: hidden;
}
.metric-bar .bar-fill {
  height: 100%; border-radius: 12px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; font-size: 0.8em; color: #fff; font-weight: 600;
}
.two-col { display: flex; gap: 24px; }
.two-col > * { flex: 1; }
@media (max-width: 700px) { .two-col { flex-direction: column; } }
.pipeline { text-align: center; margin: 32px 0; }
.pipeline svg { max-width: 100%; height: auto; }
.step-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 700;
  margin-right: 10px; flex-shrink: 0;
}
.step-header { display: flex; align-items: center; margin-bottom: 8px; }
.step-header h3 { margin: 0; }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>{{TITLE}}</h1>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="meta">PaperQA2 自动分析 · DeepSeek (文本) + Qwen3-VL-Plus (多模态) · {{DATE}}</div>
  </div>
</header>
<div class="container">
  <section>
    <h2>分析报告</h2>
    <div class="card">{{BODY}}</div>
  </section>
  <section>
    <h2>论文信息</h2>
    <div class="info-box">
      <strong>📄 引用：</strong>{{CITATION}}<br>
      <strong>DOI：</strong><a href="https://doi.org/{{DOI}}" target="_blank">{{DOI}}</a>
    </div>
  </section>
</div>
<footer>
  <p>本报告由 PaperQA2 自动分析生成 · DeepSeek (文本问答) + Qwen3-VL-Plus (图片描述)</p>
</footer>
</body>
</html>
